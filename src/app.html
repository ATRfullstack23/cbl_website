			@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap');
			@import url('https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,900&display=swap');
			*{
				margin: 0;
				padding: 0;
				border-width: 0;
				box-sizing: border-box;
				list-style-type: none;
			}
			:root{
				font-size: 14px;
			}
			html,body{
				min-height: 100vh;
			}
			body{
				font-family: 'Raleway', sans-serif;
				font-weight: normal;
				font-style: normal;
				font-size: 1rem;
				width: 100%;
				height: auto;
				display: flex;
				flex-direction: column;
				overflow-x: hidden;
			}
			ul{
				padding: 0;
			}

			section{
				display: flex;
				width: 100%;
			}
			section{
				flex-direction: column;
			}
			.section-image{
				background-size: cover;
				background-position: center;
				justify-content: center;
				align-items: center;
				height: 300px;
			}
			.over-lay{
				height: 100%;
				width: 100%;
				justify-content: center;
				align-items: center;
				background-color: rgba(0,0,0,.8);
				text-align: center;
			}
			.over-lay .details{
				justify-content: center;
				align-items: center;
				text-align: center;
			}
			.over-lay :is(h1,h2,h3,h4,h5,h6){
				color: #fff;
				font-weight: 600;
			}

			h1{
				font-size: 2.5rem;
				text-transform: capitalize;
			}
			h2{
				font-size: 1.8rem;
				text-transform: capitalize;
			}
			h3{
				font-size: 1.5rem;
				text-transform: capitalize;
			}
			h4{
				font-size: 1.3rem;
				text-transform: capitalize;
			}
			h5{
				font-size: 1.2rem;
			}
			h6{
				font-size: 1.1rem;
			}

			h1,h2,h3,h4,h5,h6{
				color: #3f3f3f;
				font-weight: 500;
				margin-bottom: 4px;
				transition: all 0.3s ease-out 0s;
			}
			:is(h1,h2,h3,h4,h5,h6).clickable:hover{
				color: #f8b239;
			}

			article,p{
				font-family: 'Lato', sans-serif;
				font-weight: normal;
				color: #3f3f3f;
				font-size: 1rem;
				line-height: 1.6rem;
				margin-bottom: 15px;
			}

			article{
				padding: 10px;
			}

			a{
				text-decoration: none;
				color: inherit;
				transition: all 100ms ease-in-out;
			}

			.main-container{
				flex-direction: column;
				min-height: 100vh;
			}

			.details-container,
			.details-container .details{
				flex-direction: column;
			}

			.details-container h4{
				cursor: pointer;
			}

			.details-container p{
				font-family: 'Lato', sans-serif;
				font-weight: normal;
				color: #666666;
				font-size: 1rem;
				line-height: 24px;
				margin-bottom: 15px;
			}

			.highlighted{
				background-color: #f8b239;
				padding: 15px 20px;
				text-transform: capitalize;
			}

			.highlighted :is(h1,h2,h3,h4,h5,h6){
				color: #fff;
				text-align: center;
				margin: 0 auto;
			}

			.under-line:is(h1,h2,h3,h4,h5,h6){
				padding-bottom: 10px;
				position: relative;
				margin-bottom: 30px;
			}

			.under-line:is(h1,h2,h3,h4,h5,h6)::before {
				background-color: #f8b239;
				bottom: 0;
				content: "";
				height: 2px;
				left: 0;
				position: absolute;
				width: 40px;
			}

			.image-container{
				margin-bottom: 15px;
				width: 100%;
			}
			.image-container img{
				width: 100%;
			}

			.btn-container span{
				cursor: pointer;
				position: relative;
				z-index: 2;
				border: 1px solid #c1c1c1;
				color: #3f3f3f;
				font-size: 13px;
				font-weight: 500;
				padding: 10px 25px;
				text-transform: capitalize;
				-webkit-transition: all 0.3s ease-out 0s;
				transition: all 0.3s ease-out 0s;
				border-radius: 5px;
				display: flex;
				width: max-content;
			}
			.btn-container span:hover{
				color: #fff;
				border: 1px solid #f8b239;
			}
			.btn-container span:after{
				background: #f8b239 none repeat scroll 0 0;
				content: "";
				height: 100%;
				left: 0;
				margin: auto;
				position: absolute;
				right: 0;
				top: 0;
				width: 0;
				z-index: -1;
				transition: all 0.3s ease-out 0s;
			}
			.btn-container span:hover::after {
				width: 100%;
			}

			.mobile div.inner-container{
				width: 100% !important;
			}

			.gray-bg {
				background: #f1f1f1;
			}
			.navy-bg {
				background: #2d3e50;
			}
			.bg-white-transparent{
				background-color: #2d3e50a9;
			}
		</style>
