<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Query Builder</title>

    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="query-builder.default.min.css">

    <script src="/lib/jquery.min.js"></script>
    <script src="bootstrap.min.js"></script>
    <script src="query-builder.standalone.min.js"></script>

</head>
<body>




<div class="">
    <div id="builder-basic"></div>

    <div class="btn-group">
        <button class="btn btn-warning reset" data-target="basic">Reset</button>
        <button class="btn btn-success set-json" data-target="basic">Set rules</button>
        <button class="btn btn-primary parse-json" data-target="basic">Get rules</button>
    </div>
</div>


<script type="text/javascript">

    var rules_basic = {
        condition: 'AND',
        rules: [{
            id: 'price',
            operator: 'less',
            value: 10.25
        }, {
            condition: 'OR',
            rules: [{
                id: 'category',
                operator: 'equal',
                value: 2
            }, {
                id: 'category',
                operator: 'equal',
                value: 1
            }]
        }]
    };

    $('#builder-basic').queryBuilder({
        plugins: ['bt-tooltip-errors'],

        filters: [
            {
                id: 'name',
                label: 'Name',
                type: 'string',
                optgroup : 'Product'
            },
            {
                id: 'category',
                label: 'Category',
                optgroup : 'Product',
                type: 'integer',
                input: 'select',
                values: {
                    1: 'Books',
                    2: 'Movies',
                    3: 'Music',
                    4: 'Tools',
                    5: 'Goodies',
                    6: 'Clothes'
                },
                operators: ['equal', 'not_equal', 'in', 'not_in', 'is_null', 'is_not_null']
            },
            {
                id: 'in_stock',
                label: 'In stock',
                optgroup : 'Inventory',
                type: 'integer',
                input: 'radio',
                values: {
                    1: 'Yes',
                    0: 'No'
                },
                operators: ['equal']
            },
            {
                id: 'price',
                label: 'Price',
                optgroup : 'Inventory',
                type: 'double',
                validation: {
                    min: 0,
                    step: 0.01
                }
            },
            {
                id: 'id',
                label: 'Identifier',
                type: 'string',
                placeholder: '____-____-____',
                operators: ['equal', 'not_equal'],
                validation: {
                    format: /^.{4}-.{4}-.{4}$/
                }
            }
        ],

        rules: rules_basic
    });

    $('.btn.reset').on('click', function() {
        $('#builder-basic').queryBuilder('reset');
    });

    $('.btn.set-json').on('click', function() {
        $('#builder-basic').queryBuilder('setRules', rules_basic);
    });

    $('.btn.parse-json').on('click', function() {
        var result = $('#builder-basic').queryBuilder('getRules');

        if (!$.isEmptyObject(result)) {
            console.log(result);
            alert(JSON.stringify(result, null, 2));

            // prepared statements with question mark params
            var sql_stmt = $('#builder-basic').queryBuilder('getSQL', 'question_mark');
            console.log(sql_stmt.sql);

// prepared statement with custom named params
            var sql_stmt_cust = $('#builder-basic').queryBuilder('getSQL', 'named(@)');
            console.log(sql_stmt_cust.sql);

// plan SQL with linebreaks
            var sql_raw = $('#builder-basic').queryBuilder('getSQL', false, true);
            console.log(sql_raw.sql);
        }

    });

</script>




</body>
</html>
