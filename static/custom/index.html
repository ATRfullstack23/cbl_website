
<dialog id="productBarcodePrintHelper">
    <form id="productBarcodePrintHelperForm">
        <div class="form">
            <div class="header">
                <span>Print Product Barcode</span>
            </div>

            <div class="content">

                <div class="productDetails">
                    <div>
                        <span>HeaderText</span>
                        <span>:</span>
                        <span id="lblHeaderText"></span>
                    </div>
                    <div>
                        <span>Model</span>
                        <span>:</span>
                        <span id="lblModel"></span>
                    </div>
                    <div>
                        <span>Style</span>
                        <span>:</span>
                        <span id="lblStyle"></span>
                    </div>
                    <div>
                        <span>Size</span>
                        <span>:</span>
                        <span id="lblSize"></span>
                    </div>
                    <!--<div>-->
                        <!--<span>Pkd Dt</span>-->
                        <!--<span>:</span>-->
                        <!--<span id="lblPackedDate"></span>-->
                    <!--</div>-->
                    <div>
                        <span>MRP</span>
                        <span>:</span>
                        <span id="lblMrp"></span>
                    </div>
                </div>


                <div class="formItem">
                    <div>Packed Date</div>
                    <input id="iPackedDate" required type="date">
                </div>

                <div class="formItem">
                    <div>Number Of Copies</div>
                    <input id="iNumberOfCopies" value="2" required placeholder="only even numbers" type="number">
                </div>

                <div class="formItem">
                    <div>Orientation</div>
                    <select id="ddlOrientation">
                        <option value="portrait">Portrait</option>
                        <option value="landscape">Landscape</option>
                    </select>
                </div>
            </div>

            <div class="footer">
                <button id="btnPrint" type="submit">Print</button>
                <button id="btnCancel" type="button">Cancel</button>
            </div>
        </div>

    </form>


</dialog>
