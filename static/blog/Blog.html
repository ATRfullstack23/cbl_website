<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Blogview</title>
    <script type="text/javascript" src="/lib/moment.js"></script>
    <script src="/lib/jquery.min.js" type="text/javascript"></script>
    <script type="text/javascript" src="/lib/chosen/chosen.jquery.js"></script>
    <script src="Utility.js" type="text/javascript"></script>
    <script type="text/javascript" src="/lib/jquery.ui.min.js"></script>
    <link rel="stylesheet" href="/lib/jquery.ui.css">
    <script src="UiUtils.js" type="text/javascript"></script>
    <script src="jquery.color.js" type="text/javascript"></script>
    <script src="jquery.Jcrop.js" type="text/javascript"></script>
    <script src="utils.js" type="text/javascript"></script>
    <script src="xmlObject.js" type="text/javascript"></script>
    <script src="ToolBox.js" type="text/javascript"></script>
    <script src="FormView.js" type="text/javascript"></script>
    <script src="ImageFromClipboard.js" type="text/javascript"></script>
    <script src="Blog.js" type="text/javascript"></script>
    <script src="global.js" type="text/javascript"></script>
    <script src="ImagePopup.js" type="text/javascript"></script>


    <script type="text/javascript" async src="/lib/tinymce/tinymce.min.js"></script>

    <!--<script src="/Applications/Email.js" type="text/javascript"></script>-->
    <link href="Styles/Style.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="/lib/chosen/chosen.css">


</head>
<body>

    <div id="header">
        <table width="100%" class="nospacing">
            <tr>
                <td>
                    <table id="divBlogViewMainControls" style="width:100%">
                    <tr>
                        <td>
                            <div style="float: left">
                                <input type="button" class="button-normal" value="Go Back" id="btnBackToParentModule"
                                    />
                            </div>
                        </td>
                        <td>
                            <div style="display: inline-block;">
                                <ul id="ulRoleBased" style="display: inline-block; margin-bottom: -11px;">
                                    <li class="module-navigation-item module-navigation-item-selected" id="liAllPosts"
                                        data-value="all" style="min-width: 100px; display: inline-block;">All Posts</li>
                                    <li class="module-navigation-item" id="liMyPosts" data-value="mine" style="min-width: 100px;
                                        display: inline-block;">My Posts</li>
                                </ul>
                            </div>
                        </td>
                        <td>
                            <div id="button">
                                <div id="buttonList" class="button-container" style="text-align: center">
                                    <input type="button" class="button-normal" value="Add New Entry" id="btnAddNewBlogEntry" />
                                    <input type="button" id="btnSortBlog" value="Sort from Oldest to Latest" title="Currently is Latest to Oldest"
                                        class="button-normal" />
                                </div>
                            </div>
                        </td>
                    </tr>
                    </table>
                </td>
            </tr>
        </table>
    </div>
    <div id="content">
        <table class="nospacing" style="width: 100%;">
            <tr>
                <td style="vertical-align: top;">
                    <div id="divParameterDetails">
                        <span id="spanParameters"></span>
                    </div>
                    <div style="width:100%;">
                        <div id="divActiveUsers" style="float:right;margin-right:100px;display:none">
                    </div>
                    <div id="divTagsFilterContainer">
                        <ul id="ulTagsFilter"></ul>
                    </div>
                    <div id="blogContainer">
                        <table id="blog">
                        </table>
                    </div>
                    <div id="blogRepliesContainer">

                    </div>
                </td>
            </tr>
        </table>
    </div>

    <!-- FormView -->
    <div id="divFormViewContainer" style="" class="div-cover">
        <table id="divFormView" style="background:#ffffff;">
            <tr>
                <td style="vertical-align: top" colspan="2">
                    <div id="divParentBlogEntryInfoContainer">
                        <span>Reply to - </span>
                        <span id="spanParentBlogEntryTitle" type="text" placeholder="Enter Title Here"></span>
                    </div>
                </td>
            </tr>
            <tr>
                <td style="vertical-align: top" colspan="2">
                    <div id="divBlogEntryTitleContainer">

                        <span>Enter Title : </span>

                        <input id="txtBlogEntryTitle" type="text" placeholder="Enter Title Here">
                    </div>
                </td>
            </tr>
            <tr>
                <td style="vertical-align: top">
                    <div id="divResizeButtonPanel" style="display: block; display:none" class="add-button-panel">
                        <div style="margin-top: 10px;">
                            <strong>Reorder And Resize :</strong><br />
                            <input type="button" value="Reorder" id="btnReorder" style="" class="button-secondary" />
                            <input type="button" value="Resize" id="btnResize" style="" class="button-secondary" />
                        </div>
                    </div>
                </td>
                <td style="vertical-align: top">
                    <div id="divWorkspace" style="display: block;" class="workspace">
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="3">
                     <div id="divAddButtonPanel" style="display: block;" class="add-button-panel">
                        <div id="divParagraph" style="margin-top: 10px;text-align:center;">
                            <label id="lblParagraphInfo" class="label-heading">Start by adding new paragraph : </label><br />
                            <img src="images/paragraph.png" style="display:inline;background-image: url(images/paragraph.png);" title="Paragraph" id="btnParagraph" class="button-image"/>
                            <img src="images/image.png" style="display:inline;background-image: url(images/image.png);" title="Image" id="btnImage" class="button-image" />
                            <img src="images/paragraph_image.png" style="display:inline;background-image: url(images/paragraph_image.png);" title="Paragraph with Image" id="btnParagraphImage" class="button-image" />
                            <img src="images/image_paragraph.png" style="display:inline;background-image: url(images/image_paragraph.png);" title="Image with Paragraph" id="btnImageParagraph" class="button-image" />
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <div id="divButtonPanel">
                        <input type="button" value="Submit" id="btnSubmit" class="button-normal" onclick="" />
                        <input type="button" value="Discard" id="btnDiscard" class="button-normal" onclick="" />
                    </div>
                </td>
            </tr>
        </table>
        <div id="divToolBox" class="toolbox">
            <div>
                <table>
                    <tr>
                        <td>
                            <input type="button" title="Increase Font Size" style="" id="btnIncreaseFontSize" value="+" class="button-secondary" data-command="increaseFontSize" />
                            <input type="button" title="Decrease Font Size" style="" id="btnDecreaseFontSize" value="-" class="button-secondary" data-command="decreaseFontSize" />
                            <input type="button" title="Bold (Ctrl + B)" style="font-weight: bold;" id="btnFontBold" value="B" class="button-secondary" data-command="bold" />
                            <input type="button" title="Italic (Ctrl + I)" style="font-style: italic;" id="btnFontItalic" value="I" class="button-secondary" data-command="italic" />
                            <input type="button" title="Underline (Ctrl + U)" style="text-decoration: underline;" id="Button1" value="U" class="button-secondary" data-command="underline" />
                            <input type="button" title="Strikethrough" style="text-decoration: line-through;" id="btnUFontnderline" value="S" class="button-secondary" data-command="strikethrough" />
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="button" title="Align Center" id="btnAlignCenter" value="C" class="button-secondary" data-command="justifyCenter" />
                            <input type="button" title="Align Left" id="btnAlignLeft" value="L" class="button-secondary" data-command="justifyLeft" />
                            <input type="button" title="Align Full Justification" id="btnAlignFull" value="J" class="button-secondary" data-command="justifyFull" />
                            <input type="button" title="Align Right" id="btnAlignRight" value="R" class="button-secondary" data-command="justifyRight" />
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div id="divImagePopupContainer" style="" class="div-cover">
        <div id="div1" style="display: block;">
            <img id="imgOriginal" class="image-original"></img>
            <div id="divImageDetails" class="image-details">
            </div>
        </div>
    </div>
    <!-- End -->
    <script type="text/javascript">
    </script>
</body>
</html>
